services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codementor_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - WATCHFILES_FORCE_POLLING=true
    networks:
      - codementor_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codementor_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - codementor_net
    depends_on:
      - backend

networks:
  codementor_net:
    driver: bridge
